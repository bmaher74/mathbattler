# Math Battler — static deploy (Netlify + optional Cloudflare in front)
# runtime-config.js must be tracked in Git (stub) so Netlify uploads it; the build overwrites it from env.
#
# Cloudflare (DNS + HTTPS to visitors):
# - Add a CNAME: your hostname → <your-site>.netlify.app, Proxied (orange cloud).
# - SSL/TLS → Overview → Full (strict). Avoid "Flexible" (origin must be HTTPS-capable; Netlify is).
# - Add the same hostname under Netlify → Domain management → Custom domains.
#
# Netlify → Environment variables (optional; baked into runtime-config.js at build time):
# DASHSCOPE_API_KEY, DASHSCOPE_BASE_URL, DASHSCOPE_MODEL, DASHSCOPE_CHAT_COMPLETIONS_URL,
# FIREBASE_CONFIG_JSON or FIREBASE_API_KEY + FIREBASE_PROJECT_ID + other FIREBASE_* fields.
# CONTEXT=production (set by Netlify) enables streamlined UI (no integrity strip / API debug). Override with
# MATHBATTLER_PRODUCTION_UI=0 on production if needed, or add ?debug=1 to the URL to show dev UI.
#
# Firebase Console → Authentication → Settings → Authorized domains:
# - <your-site>.netlify.app
# - your custom domain(s) once DNS points here

[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"
  # Variables marked "Contains secret values" are scanned in build output; embedding them in
  # runtime-config.js is intentional (browser-visible keys). Without this, builds can fail and the
  # previous deploy (without this file) stays live → /runtime-config.js 404.
  # https://docs.netlify.com/build/environment-variables/secrets-controller/#configure-secret-scanning
  SECRETS_SCAN_OMIT_PATHS = "runtime-config.js"
  # BASE_URL and MODEL match public defaults in ai-config.js, main.js, samples — not unique secrets.
  # If marked "secret" in Netlify, scanning flags every file that contains the same strings.
  SECRETS_SCAN_OMIT_KEYS = "DASHSCOPE_BASE_URL,DASHSCOPE_MODEL"

# Match local dev (serve-static serves runtime-config with no-store)
[[headers]]
  for = "/runtime-config.js"
  [headers.values]
    Cache-Control = "no-store"

# Some browsers probe /favicon.ico even when an icon is specified.
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 301

# Prevent stale JS from keeping legacy DashScope-in-browser code alive after deploys.
[[headers]]
  for = "/js/main.js"
  [headers.values]
    Cache-Control = "no-store"
